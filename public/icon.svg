    <line x1="352" y1="360" x2="352" y2="250" />
  </g>
  
  <!-- Glowing neon indicators -->
  <circle cx="160" cy="396" r="10" fill="#00FFCC" />
  <circle cx="208" cy="190" r="10" fill="#FF00AA" />
  <circle cx="256" cy="100" r="10" fill="#00FFCC" />
  <circle cx="304" cy="150" r="10" fill="#FF00AA" />
  <circle cx="352" cy="220" r="10" fill="#00FFCC" />
</svg>
