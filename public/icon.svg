      <stop offset="0%" stop-color="#00FFCC" />
      <stop offset="100%" stop-color="#FF00AA" />
    </linearGradient>
  </defs>
  <!-- Dark Industrial Brutalist Backdrop -->
  <rect width="512" height="512" rx="120" fill="#0F0F15" />
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#161622" stroke-width="12" />
  
  <!-- Stylized Synth Waveform / Forge Anvil Graphic -->
